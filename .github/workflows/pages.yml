name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  repository_dispatch:
    types:
      - adaengine-demos-updated
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-26
    env:
      SWIFT_WASM_SDK_ID: ${{ vars.SWIFT_WASM_SDK_ID || 'swift-6.3.2-RELEASE_wasm' }}
      SWIFT_WASM_SDK_URL: ${{ vars.SWIFT_WASM_SDK_URL || 'https://download.swift.org/swift-6.3.2-release/wasm-sdk/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE_wasm.artifactbundle.tar.gz' }}
      SWIFT_WASM_SDK_CHECKSUM: ${{ vars.SWIFT_WASM_SDK_CHECKSUM || 'a61f0584c93283589f8b2f42db05c1f9a182b506c2957271402992655591dd7c' }}
    steps:
      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: '26.1.1'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout AdaEngine
        uses: actions/checkout@v4
        with:
          repository: AdaEngine/AdaEngine
          ref: ${{ github.event.client_payload.ref || 'main' }}
          path: AdaEngine

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Swift WASM SDK
        run: |
          if ! swift sdk list | grep -qx "${SWIFT_WASM_SDK_ID}"; then
            swift sdk install "${SWIFT_WASM_SDK_URL}" --checksum "${SWIFT_WASM_SDK_CHECKSUM}"
          fi

          swift sdk list
          if ! swift sdk list | grep -qx "${SWIFT_WASM_SDK_ID}"; then
            echo "Swift WASM SDK '${SWIFT_WASM_SDK_ID}' is not installed after installation."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Test
        run: npm run test

      - name: Build AdaEngine demos
        run: |
          if [ ! -f AdaEngine/scripts/build-website-demos.mjs ]; then
            echo "AdaEngine demos build script was not found; skipping demos."
            exit 0
          fi

          node AdaEngine/scripts/build-website-demos.mjs \
            --package-dir AdaEngine \
            --output public/demos \
            --swift-sdk "${SWIFT_WASM_SDK_ID}"

      - name: Build
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload website artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: dist
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download website artifact
        uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: dist

      - name: Checkout Pages repository
        uses: actions/checkout@v4
        with:
          repository: AdaEngine/adaengine.github.io
          token: ${{ secrets.DEPLOY_ACCESS_TOKEN }}
          path: pages-repo

      - name: Publish to adaengine.github.io
        run: |
          find pages-repo -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R dist/. pages-repo/
          printf 'adaengine.org\n' > pages-repo/CNAME

          cd pages-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all

          if git diff --cached --quiet; then
            echo "No changes to publish"
          else
            git commit -m "Deploy website from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
            git push origin HEAD:main
          fi
