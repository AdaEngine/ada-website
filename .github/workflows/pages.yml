name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  repository_dispatch:
    types:
      - adaengine-demos-updated
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-26
    env:
      SWIFT_WASM_SDK_ID: ${{ vars.SWIFT_WASM_SDK_ID || 'swift-6.3.2-RELEASE_wasm' }}
      SWIFT_WASM_SDK_URL: ${{ vars.SWIFT_WASM_SDK_URL || 'https://download.swift.org/swift-6.3.2-release/wasm-sdk/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE_wasm.artifactbundle.tar.gz' }}
      SWIFT_WASM_SDK_CHECKSUM: ${{ vars.SWIFT_WASM_SDK_CHECKSUM || 'a61f0584c93283589f8b2f42db05c1f9a182b506c2957271402992655591dd7c' }}
    steps:
      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: '26.1.1'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout AdaEngine
        uses: actions/checkout@v4
        with:
          repository: AdaEngine/AdaEngine
          ref: ${{ github.event.client_payload.ref || 'main' }}
          path: AdaEngine

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Swift WASM SDK
        run: |
          if ! swift sdk list | grep -qx "${SWIFT_WASM_SDK_ID}"; then
            swift sdk install "${SWIFT_WASM_SDK_URL}" --checksum "${SWIFT_WASM_SDK_CHECKSUM}"
          fi

          swift sdk list
          if ! swift sdk list | grep -qx "${SWIFT_WASM_SDK_ID}"; then
            echo "Swift WASM SDK '${SWIFT_WASM_SDK_ID}' is not installed after installation."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ secrets.DEPLOY_ACCESS_TOKEN }}

      - name: Configure Pages custom domain
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_ACCESS_TOKEN || github.token }}
          CUSTOM_DOMAIN: adaengine.org
        run: |
          curl --fail-with-body --location --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            --data "{\"cname\":\"${CUSTOM_DOMAIN}\",\"build_type\":\"workflow\"}"

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Test
        run: npm run test

      - name: Build AdaEngine demos
        run: |
          node AdaEngine/scripts/build-website-demos.mjs \
            --package-dir AdaEngine \
            --output public/demos \
            --swift-sdk "${SWIFT_WASM_SDK_ID}"

      - name: Build
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: https://adaengine.org/
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
